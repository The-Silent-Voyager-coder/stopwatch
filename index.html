<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stopwatch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.display{font-size:6rem;font-weight:bold;font-family:monospace;margin:20px 0;letter-spacing:4px}
.controls{display:flex;gap:12px;margin:16px 0}
button{padding:14px 30px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;font-size:1.1rem;transition:transform .1s}
button:hover{transform:scale(1.05)}
.start{background:#22c55e;color:#fff}.pause{background:#eab308;color:#000}.reset{background:#ef4444;color:#fff}.lap{background:#3b82f6;color:#fff}
.laps{width:100%;max-width:400px;margin-top:20px}
.lap-item{display:flex;justify-content:space-between;padding:8px 16px;background:#1e293b;border-radius:6px;margin-bottom:4px;font-family:monospace;font-size:.9rem}
.lap-item .fast{color:#22c55e}.lap-item .slow{color:#ef4444}
</style>
</head>
<body>
<div class="display" id="display">00:00:00.000</div>
<div class="controls">
<button class="start" id="startBtn" onclick="toggleStart()">Start</button>
<button class="lap" onclick="recordLap()">Lap</button>
<button class="reset" onclick="reset()">Reset</button>
</div>
<div class="laps" id="laps"></div>
<script>
let startTime=0,elapsed=0,interval=null,running=false,laps=[];
function toggleStart(){
if(running){running=false;clearInterval(interval);document.getElementById('startBtn').textContent='Resume';document.getElementById('startBtn').className='start';}
else{running=true;startTime=Date.now()-elapsed;
interval=setInterval(()=>{elapsed=Date.now()-startTime;render();},10);
document.getElementById('startBtn').textContent='Pause';document.getElementById('startBtn').className='pause';}}
function reset(){running=false;clearInterval(interval);elapsed=0;laps=[];
document.getElementById('startBtn').textContent='Start';document.getElementById('startBtn').className='start';
render();document.getElementById('laps').innerHTML='';}
function recordLap(){if(!running)return;laps.push(elapsed);renderLaps();}
function formatTime(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000),ms2=ms%1000;
return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(ms2).padStart(3,'0');}
function render(){document.getElementById('display').textContent=formatTime(elapsed);}
function renderLaps(){
const el=document.getElementById('laps');el.innerHTML='';
const diffs=laps.map((l,i)=>i===0?l:l-laps[i-1]);
const min=Math.min(...diffs),max=Math.max(...diffs);
laps.forEach((l,i)=>{
const d=document.createElement('div');d.className='lap-item';
const diff=diffs[i];const cls=diff===min?'fast':diff===max?'slow':'';
d.innerHTML='<span>Lap '+(i+1)+'</span><span class="'+cls+'">'+formatTime(diff)+'</span><span>'+formatTime(l)+'</span>';
el.appendChild(d);});el.scrollTop=el.scrollHeight;}
render();
</script>
</body>
</html>
